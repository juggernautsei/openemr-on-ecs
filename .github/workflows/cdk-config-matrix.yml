name: CDK Configuration Matrix Testing

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - sprint/**
      - hotfix/**
      - bugfix/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "24"

jobs:
  config-matrix-test:
    name: Test CDK Configurations
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install AWS CDK CLI
        run: |
          npm install --location=global aws-cdk@2
      - name: Seed CDK context cache for CI
        run: |
          cat > cdk.context.json <<'JSON'
          {
            "availability-zones:account=600430252128:region=us-east-2": [
              "us-east-2a",
              "us-east-2b",
              "us-east-2c"
            ],
            "hosted-zone:account=600430252128:domainName=tarevoehr.app:region=us-east-2": {
              "Id": "/hostedzone/Z04523733LXLATJJ8NU9B",
              "Name": "tarevoehr.app."
            }
          }
          JSON

      - name: Run comprehensive configuration matrix tests
        env:
          AWS_ACCESS_KEY_ID: "fake"
          AWS_SECRET_ACCESS_KEY: "fake"
          CDK_DEFAULT_ACCOUNT: "600430252128"
          AWS_DEFAULT_REGION: "us-east-2"
          CDK_DEFAULT_REGION: "us-east-2"
        run: |
          echo "Testing all CDK configuration combinations..."
          python3 scripts/test-cdk-synthesis.py --verbose

      - name: Run original stress test
        env:
          AWS_ACCESS_KEY_ID: "fake"
          AWS_SECRET_ACCESS_KEY: "fake"
          CDK_DEFAULT_ACCOUNT: "600430252128"
          AWS_DEFAULT_REGION: "us-east-2"
          CDK_DEFAULT_REGION: "us-east-2"
        run: |
          echo "Running bash stress test script..."
          bash scripts/stress-test.sh

      - name: Upload synthesis artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cdk-synth-logs
          path: /tmp/cdk-synth-*.log
          if-no-files-found: ignore
          retention-days: 7

